# Wajib ada di bagian atas file nginx.conf
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types; # Menambahkan pembacaan tipe file CSS/JS agar tidak diblokir

    server {
        listen 80;
        server_name localhost;
        root /var/www/public; # Folder public Laravel
        index index.php index.html;

        charset utf-8;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include /etc/nginx/fastcgi_params;

            # --- SOLUSI MUTLAK MIXED CONTENT ---
            # Memaksa PHP-FPM mengenali header HTTPS dari load balancer Railway
            fastcgi_param HTTPS 'on';
            fastcgi_param HTTP_X_FORWARDED_PROTO 'https';
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}